name: CI to Docker Hub  # Tên quy trình

on:
  push:
    branches: [ "main" ]  # Tự động chạy mỗi khi push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 3: Build Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'username' bằng tên Docker Hub của bạn, 'app-name' bằng tên bạn muốn đặt cho image
          tags: ${{ secrets.DOCKER_USERNAME }}/java-spring-boot-app:latest
